# PostgreSQL. Versions 9.3 and up are supported.
#
# Docker Compose sets DATABASE_URL (Rails picks it up automatically).
# Discrete host/user/password defaults support local tooling against published ports.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", "5432") %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "strongmind_interview_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_TEST_DB", "strongmind_interview_test") %>

production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>
